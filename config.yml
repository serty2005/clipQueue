app:
    data_dir: .
    silent: false
hotkeys:
    toggle_queue: sig:AQADCgBDAC4AAAAAAAAB
    paste_next: sig:AQADCgBWAC8AAAAAAAAB
    toggle_queue_display: Ctrl+Alt+C
    paste_next_display: Ctrl+Alt+V
clipboard:
    watch_debounce_ms: 30
    paste_delay_ms: 50
    restore_delay_ms: 250
queue:
    default_order: LIFO
features:
    enable_queue: true
    enable_clipboard: true
    enable_macros: true
    enable_lab: true
macros:
    - name: "212"
      hotkey: Ctrl+2
      signature: sig:AQABCgAyAAMAAAAAAAAB
      text: ""
      sequence: 
      sequence_normalize_delays: true
      sequence_delay_ms: 50
      mode: sequence
    - name: "2222"
      hotkey: Ctrl+F
      signature: sig:AQABCgBGACEAAAAAAAAB
      text: ""
      sequence: 
      sequence_delay_ms: 15
      mode: sequence
